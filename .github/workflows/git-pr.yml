name: Node.js CI

# التريجر (Trigger): متى يعمل هذا الـ Pipeline؟
on:
  push:
    branches: [ "master" ] # تأكدنا من أن اسم الفرع master كما يظهر في صورك
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # يتيح لك تشغيل الـ Action يدوياً من GitHub للتجربة

jobs:
  build-and-test:
    runs-on: ubuntu-latest # البيئة التي سيعمل عليها الكود

    steps:
      # 1. سحب الكود من GitHub إلى السيرفر
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد بيئة Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. تثبيت التبعيات (Dependencies)
      - name: Install dependencies
        run: npm install

      # 4. إعطاء صلاحية التنفيذ لسكربت الاختبار
      - name: Make test script executable
        run: chmod +x src/test.sh

      # 5. تشغيل الاختبار (الذي يستدعي test.sh)
      - name: Run tests
        run: npm test